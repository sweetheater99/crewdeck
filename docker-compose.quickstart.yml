services:
  crewdeck:
    build: .
    ports:
      - "${CREWDECK_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      CREWDECK_HOME: "/crewdeck"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - crewdeck-data:/crewdeck
    restart: unless-stopped

volumes:
  crewdeck-data:
