services:
  crewdeck:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CREWDECK_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      CREWDECK_HOME: "/crewdeck"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - "${CREWDECK_DATA_DIR:-./data/docker-crewdeck}:/crewdeck"
